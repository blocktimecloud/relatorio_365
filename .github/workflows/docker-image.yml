name: Docker Image CI

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build da imagem
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/office365:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/office365:${{ github.sha }} \
                     ${{ secrets.DOCKERHUB_USERNAME }}/office365:latest

      - name: Push da imagem
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/office365:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/office365:latest
